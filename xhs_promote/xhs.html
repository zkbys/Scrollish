<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrollish 双重交互演示</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background-color: #121212;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 小红书 3:4 卡片容器 */
    .xhs-card {
      width: 540px;
      height: 720px;
      position: relative;
      overflow: hidden;
      background-color: #000;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid #333;
    }

    /* 手机外框 */
    .phone-frame {
      width: 340px;
      height: 600px;
      background: #000;
      border-radius: 35px;
      border: 8px solid #2d2d30;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      z-index: 10;
    }

    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 25px;
      background: #2d2d30;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      z-index: 30;
    }

    /* 可编辑文字样式 */
    [contenteditable="true"]:hover {
      outline: 1px dashed rgba(255, 255, 255, 0.5);
      cursor: text;
    }

    .btn-download {
      margin-top: 20px;
      padding: 10px 30px;
      background: #FF4500;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
    }

    /* 自定义徽章样式 */
    .badge {
      position: absolute;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      z-index: 20;
      backdrop-filter: blur(4px);
    }
  </style>
</head>

<body>

  <div class="xhs-card rounded-3xl pt-8 bg-zinc-950" id="fusion-card">
    <div
      class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_top_left,_var(--tw-gradient-stops))] from-green-900/30 to-transparent z-0">
    </div>
    <div
      class="absolute bottom-0 right-0 w-full h-full bg-[radial-gradient(circle_at_bottom_right,_var(--tw-gradient-stops))] from-blue-900/30 to-transparent z-0">
    </div>

    <div class="z-20 text-center mb-6 px-4">
      <h1 class="text-3xl font-black text-white" contenteditable="true">
        独家<span class="text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500">双重交互</span>设计
      </h1>
      <p class="text-gray-400 text-sm mt-2" contenteditable="true">纵向深挖语料，横向无限吃瓜</p>
    </div>

    <div class="phone-frame">
      <div class="notch"></div>

      <div class="relative w-full h-full flex bg-black">

        <div class="relative w-[80%] h-full border-r-2 border-zinc-800 z-10">

          <div class="relative h-[48%] overflow-hidden">
            <img src="./comment1_1.png" class="w-full h-full object-cover object-top filter brightness-90">
            <div class="badge top-3 left-3 bg-black/50 text-gray-300 border border-gray-600">English 原文</div>
          </div>

          <div
            class="h-[4%] bg-gradient-to-b from-green-900 to-zinc-900 flex items-center justify-center relative border-y border-green-500/30">
            <div class="flex items-center gap-1 text-green-400 text-[10px] font-bold uppercase tracking-widest">
              <span class="text-sm">👇</span> Pull Down to Translate
            </div>
          </div>

          <div class="relative h-[48%] overflow-hidden">
            <img src="./comment1_2.png" class="w-full h-full object-cover object-top">
            <div class="badge top-3 left-3 bg-green-900/70 text-green-300 border border-green-500">中文解析</div>
            <div
              class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-4xl drop-shadow-lg opacity-80">
              👇</div>
          </div>
        </div>

        <div class="relative w-[20%] h-full bg-zinc-900 z-0 overflow-hidden">
          <img src="./comment3.png"
            class="w-full h-full object-cover object-left opacity-40 filter blur-[2px] brightness-50">

          <div class="absolute top-1/2 left-[-20px] transform -translate-y-1/2 z-30 flex flex-col items-center">
            <div class="text-5xl text-blue-400 drop-shadow-[2px_2px_4px_rgba(0,0,0,1)]">👉</div>
          </div>
          <div
            class="badge bottom-20 right-1 bg-blue-900/70 text-blue-200 border border-blue-500 rotate-90 origin-bottom-right whitespace-nowrap">
            Next Top Comment
          </div>
        </div>

      </div>
    </div>

    <div class="z-20 mt-6 flex gap-6">
      <div class="flex items-center gap-2">
        <span class="bg-green-500 w-3 h-3 rounded-full"></span>
        <span class="text-gray-300 text-xs font-bold" contenteditable="true">下滑：查看翻译</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="bg-blue-500 w-3 h-3 rounded-full"></span>
        <span class="text-gray-300 text-xs font-bold" contenteditable="true">右滑：切换下条</span>
      </div>
    </div>

  </div>

  <button class="btn-download" onclick="downloadCard()">下载这张融合卡片</button>

  <script>
    function downloadCard () {
      const element = document.getElementById('fusion-card')
      html2canvas(element, {
        scale: 2, // 2倍清晰度
        useCORS: true,
        backgroundColor: null
      }).then(canvas => {
        const link = document.createElement('a')
        link.download = 'scrollish_interaction_fusion.png'
        link.href = canvas.toDataURL("image/png")
        link.click()
      }).catch(err => {
        console.error(err)
        alert("下载失败，请使用截图工具截取。")
      })
    }
  </script>
</body>

</html>

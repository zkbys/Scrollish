<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrollish 真实感宣传图</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background-color: #222;
      padding: 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
    }

    .canvas-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* === 极简卡片：模仿手机相册截图风格 === */
    .xhs-card {
      width: 540px;
      height: 720px;
      position: relative;
      background-color: #f2f2f2;
      /* 浅灰背景，像便利贴或桌面 */
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 60px;
    }

    /* 文案风格：像是在备忘录里打的字 */
    .hand-note {
      font-size: 32px;
      font-weight: 900;
      color: #333;
      text-align: center;
      line-height: 1.4;
      margin-bottom: 30px;
      z-index: 20;
      transform: rotate(-2deg);
      /* 稍微歪一点，像贴纸 */
      background: #ffeb3b;
      /* 荧光笔高亮色 */
      padding: 10px 20px;
      box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.1);
    }

    /* 手机界面：直角无边框，或者微圆角，去除复杂的3D壳 */
    .screen-shot {
      width: 320px;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      border: 4px solid #fff;
      z-index: 10;
    }

    /* 装饰元素：简单的圆圈标记 */
    .circle-mark {
      position: absolute;
      border: 5px solid #ff5252;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      z-index: 30;
      transform: rotate(-10deg);
      opacity: 0.8;
    }

    /* 箭头：简单的字符箭头，不要SVG */
    .arrow-mark {
      position: absolute;
      font-size: 40px;
      color: #ff5252;
      z-index: 30;
      font-weight: bold;
    }

    /* 背景噪点：增加真实感 */
    .noise {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>

<body>

  <div class="canvas-container" id="card-1">
    <div class="xhs-card" style="background-color: #e3e3e3;">
      <div class="noise"></div>

      <div class="hand-note">
        这是 <span class="marker-bg" style="transform: rotate(-2deg);">Reddit</span> 评论区？<br>
        不，这是 <span style="color: #ec4899;">吃瓜唠嗑群</span> 🍉
      </div>

      <img src="./chat.png" class="screen-shot" style="transform: rotate(2deg);">

      <div style="margin-top: 30px; font-size: 14px; color: #666; font-weight: bold;">
        🚫 拒绝背单词 · ✅ 只刷感兴趣的
      </div>
    </div>
  </div>

  <div class="canvas-container" id="card-2">
    <div class="xhs-card" style="background-color: #d1fae5;">
      <div class="noise"></div>

      <div class="hand-note" style="background: #fff; transform: rotate(1deg);">
        别查字典了<br>这才是“活”的英语
      </div>

      <div style="position: relative;">
        <img src="./click_dict2.png" class="screen-shot">
        <div class="circle-mark" style="top: 380px; right: 40px; width: 200px; height: 80px; border-radius: 50%;"></div>
        <div class="arrow-mark" style="top: 450px; right: 20px;">↗</div>
        <div
          style="position: absolute; top: 490px; right: 20px; background: #fff; padding: 5px 10px; font-size: 12px; font-weight: bold; border-radius: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);">
          根据语境解释！
        </div>
      </div>
    </div>
  </div>

  <div class="canvas-container" id="card-3">
    <div class="xhs-card" style="background-color: #dbeafe;">
      <div class="noise"></div>

      <div class="hand-note" style="background: #fff; transform: rotate(-1deg); font-size: 28px;">
        承认吧，你就是想偷懒<br>长按“作弊”看中文
      </div>

      <div style="position: relative;">
        <img src="./long_press.png" class="screen-shot" style="transform: rotate(-1deg);">
        <div
          style="position: absolute; top: 250px; left: 150px; font-size: 60px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));">
          👆
        </div>
        <div
          style="position: absolute; top: 320px; left: 120px; color: #3b82f6; font-weight: 900; background: rgba(255,255,255,0.8); padding: 4px 8px; border-radius: 4px;">
          长按显形
          <br>
          松开隐形
        </div>
      </div>
    </div>
  </div>

</body>

</html>
